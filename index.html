<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ura Ura Surfing Simulator</title>
    <script type="module" crossorigin src="/osrs-surfing-sim/assets/index-l492VMMi.js"></script>
    <link rel="stylesheet" crossorigin href="/osrs-surfing-sim/assets/index-DWqDpdUy.css">
  </head>
  <body>
    <div id="app">
      <div class="osrs-scale-shell" id="osrs-scale-shell">
        <div class="osrs-scale-wrap" id="osrs-scale-wrap">
          <div class="osrs-client" id="osrs-client">
            <div class="osrs-window-top"></div>
            <div class="osrs-top-right-corner" aria-hidden="true"></div>
            <div class="osrs-client-grid">
              <div class="osrs-viewport-wrap">
                <div id="game-root"></div>
              </div>
              <div id="chatbox-root"></div>
              <aside class="osrs-sidebar">
                <div class="osrs-minimap" id="minimap-root">
                  <div class="osrs-minimap-map" id="minimap-map"></div>
                  <button
                    type="button"
                    class="osrs-minimap-compass"
                    id="minimap-compass"
                    title="Face north"
                  >
                    <img alt="" />
                  </button>
                  <img class="osrs-minimap-frame" id="minimap-frame" alt="" />
                </div>
                <div class="osrs-sidebar-body">
                  <div id="tab-strip-top"></div>
                  <div class="osrs-interface-row">
                    <div
                      class="osrs-interface-edge osrs-interface-edge-left"
                      aria-hidden="true"
                    ></div>
                    <div class="osrs-interface-panel">
                      <div id="skills-panel"></div>
                      <div id="sailing-panel"></div>
                    </div>
                    <div
                      class="osrs-interface-edge osrs-interface-edge-right"
                      aria-hidden="true"
                    ></div>
                  </div>
                  <div id="tab-strip-bottom"></div>
                </div>
              </aside>
            </div>
            <div id="shop-panel" class="osrs-shop-panel hidden"></div>
          </div>
        </div>
      </div>
      <div id="debug-panel" class="debug-panel"></div>
    </div>
  </body>
</html>
