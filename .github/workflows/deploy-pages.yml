name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          GITHUB_PAGES: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable GitHub Pages
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" --jq .status >/dev/null 2>&1; then
            gh api -X PUT "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - id: deployment
        uses: actions/deploy-pages@v4
